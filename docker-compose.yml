services:
  mysql:
    image: mysql:8.0
    container_name: assetflow-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: assetflow
      MYSQL_DATABASE: assetflow
      MYSQL_USER: assetflow
      MYSQL_PASSWORD: assetflow
    ports:
      - "33061:3306"
    volumes:
      - assetflow_mysql_data:/var/lib/mysql
      - ./docker/mysql-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uassetflow", "-passetflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: assetflow-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  assetflow_mysql_data:
